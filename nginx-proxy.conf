# Nginx Reverse Proxy Configuration for Localhost Demo (Mr. Bob Capstone Requirements)
# Maps taskflow.test -> WordPress (127.0.0.1:8080)
# Maps app.taskflow.test -> Next.js SaaS (127.0.0.1:3001)

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # 1. WordPress Landing Page Reverse Proxy (taskflow.test)
    server {
        listen       80;
        server_name  taskflow.test www.taskflow.test;

        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 2. Next.js SaaS Application Reverse Proxy (app.taskflow.test)
    server {
        listen       80;
        server_name  app.taskflow.test www.app.taskflow.test;

        location / {
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
